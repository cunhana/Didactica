<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Examen Didáctica – Educación Infantil</title>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-dark: #3730a3;
      --success: #16a34a;
      --danger: #dc2626;
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 48px;
    }
    header {
      text-align: center;
      margin-bottom: 32px;
    }
    header h1 {
      font-size: 1.8rem;
      color: var(--primary-dark);
      margin-bottom: 6px;
    }
    header p {
      color: var(--muted);
      font-size: 0.95rem;
    }
    .progress-bar-wrap {
      background: var(--border);
      border-radius: 999px;
      height: 10px;
      max-width: 640px;
      margin: 0 auto 28px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      background: var(--primary);
      border-radius: 999px;
      transition: width 0.4s ease;
      width: 0%;
    }
    #quiz-container { max-width: 760px; margin: 0 auto; }

    .question-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 28px 20px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
      animation: fadeIn .3s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    .question-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 18px;
    }
    .question-number {
      background: var(--primary);
      color: #fff;
      border-radius: 50%;
      min-width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: .85rem;
      flex-shrink: 0;
    }
    .question-text {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.55;
    }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option-label {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all .18s;
      font-size: .95rem;
      line-height: 1.45;
    }
    .option-label:hover { border-color: var(--primary); background: #eef2ff; }
    .option-label input[type=radio] { margin-top: 3px; accent-color: var(--primary); flex-shrink: 0; }
    .option-label.correct { border-color: var(--success); background: #dcfce7; }
    .option-label.incorrect { border-color: var(--danger); background: #fee2e2; }

    .feedback {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: .88rem;
      display: none;
    }
    .feedback.show { display: block; }
    .feedback.ok { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    .feedback.ko { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

    .btn-check {
      margin-top: 16px;
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: .93rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-check:hover { background: var(--primary-dark); }
    .btn-check:disabled { background: var(--muted); cursor: default; }

    #result-card {
      display: none;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 28px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,.1);
      max-width: 560px;
      margin: 0 auto;
    }
    #result-card h2 { font-size: 1.6rem; color: var(--primary-dark); margin-bottom: 8px; }
    #score-text { font-size: 3rem; font-weight: 800; margin: 16px 0 8px; }
    #score-label { color: var(--muted); margin-bottom: 24px; }
    #result-msg { font-size: 1rem; margin-bottom: 28px; color: var(--text); }
    .btn-restart {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-restart:hover { background: var(--primary-dark); }

    #submit-all-wrap { text-align: center; margin: 8px 0 32px; }
    #btn-submit-all {
      background: #16a34a;
      color: #fff;
      border: none;
      padding: 14px 40px;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(22,163,74,.3);
      transition: background .2s, transform .1s;
    }
    #btn-submit-all:hover { background: #15803d; transform: translateY(-1px); }

    .tag {
      display: inline-block;
      background: #e0e7ff;
      color: #3730a3;
      font-size: .72rem;
      padding: 2px 8px;
      border-radius: 999px;
      margin-bottom: 10px;
      font-weight: 600;
      letter-spacing: .02em;
      text-transform: uppercase;
    }
    footer {
      text-align: center;
      margin-top: 48px;
      color: var(--muted);
      font-size: .82rem;
    }
  </style>
</head>

  <h1>🎓 Examen – Didáctica Educación Infantil</h1>

let answered = {};

function buildQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  answered = {};
  updateProgress();

  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card-' + i;

    const optsHTML = q.opts.map((opt, j) => `
      <label class="option-label" id="opt-${i}-${j}">
        <input type="radio" name="q${i}" value="${j}" onchange="onSelect(${i})">
        <span>${opt}</span>
      </label>`).join('');

    card.innerHTML = `
      <span class="tag">${q.tag}</span>
      <div class="question-header">
        <span class="question-number">${i+1}</span>
        <span class="question-text">${q.q}</span>
      </div>
      <div class="options">${optsHTML}</div>
      <div class="feedback" id="fb-${i}"></div>`;

    container.appendChild(card);
  });

  document.getElementById('submit-all-wrap').style.display = 'block';
  document.getElementById('result-card').style.display = 'none';
  window.scrollTo({top:0, behavior:'smooth'});
}

function onSelect(i) {
  updateProgress();
}

function updateProgress() {
  const total = questions.length;
  const done = Object.keys(answered).length + 
    questions.filter((_,i) => !answered.hasOwnProperty(i) && document.querySelector(`input[name="q${i}"]:checked`)).length;
  const pct = Math.round((Object.keys(answered).length / total) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
}

function submitAll() {
  let score = 0;
  questions.forEach((q, i) => {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    const fb = document.getElementById('fb-' + i);

    // disable all radios
    document.querySelectorAll(`input[name="q${i}"]`).forEach(r => r.disabled = true);

    if (selected) {
      const val = parseInt(selected.value);
      answered[i] = val;
      if (val === q.answer) {
        score++;
        document.getElementById(`opt-${i}-${val}`).classList.add('correct');
        fb.className = 'feedback show ok';
        fb.textContent = '✅ Correcto. ' + q.fb;
      } else {
        document.getElementById(`opt-${i}-${val}`).classList.add('incorrect');
        document.getElementById(`opt-${i}-${q.answer}`).classList.add('correct');
        fb.className = 'feedback show ko';
        fb.textContent = '❌ Incorrecto. ' + q.fb;
      }
    } else {
      answered[i] = null;
      document.getElementById(`opt-${i}-${q.answer}`).classList.add('correct');
      fb.className = 'feedback show ko';
      fb.textContent = '⚠️ Sin responder. ' + q.fb;
    }
  });

  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('submit-all-wrap').style.display = 'none';

  const pct = Math.round((score / questions.length) * 100);
  const scoreEl = document.getElementById('score-text');
  scoreEl.textContent = score + ' / ' + questions.length;
  scoreEl.style.color = pct >= 70 ? 'var(--success)' : pct >= 50 ? 'var(--primary)' : 'var(--danger)';
  document.getElementById('score-label').textContent = pct + '% de aciertos';
  let msg = '';
  if (pct >= 90) msg = '🏆 ¡Excelente! Dominas perfectamente la materia.';
  else if (pct >= 70) msg = '👍 Buen resultado. Repasa los temas con más errores.';
  else if (pct >= 50) msg = '📚 Resultado aprobado pero hay margen de mejora. ¡Sigue estudiando!';
  else msg = '💪 Necesitas reforzar el estudio. ¡No te rindas, vuelve a intentarlo!';
  document.getElementById('result-msg').textContent = msg;
  document.getElementById('result-card').style.display = 'block';

  setTimeout(() => {
    document.getElementById('result-card').scrollIntoView({behavior:'smooth', block:'center'});
  }, 300);
}

function restartQuiz() {
  buildQuiz();
}

buildQuiz();
