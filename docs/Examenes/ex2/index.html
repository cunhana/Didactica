<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Examen experto EI Aragón</title>

<style>
body{font-family:system-ui;background:#f4f6f8;color:#1f2933;margin:0}
.w{max-width:1000px;margin:auto;padding:20px}
.c{background:#fff;border:1px solid #dcdcdc;border-radius:14px;padding:18px;margin:14px 0;box-shadow:0 6px 18px rgba(0,0,0,.08)}
.s{position:sticky;top:0;background:linear-gradient(#f4f6f8 80%,rgba(244,246,248,0));padding:10px 0;z-index:5}
button{background:#1e88e5;color:#fff;border:0;border-radius:10px;padding:12px 16px;font-weight:700;cursor:pointer}
button.sec{background:#e0e0e0;color:#222}
.o{display:block;padding:10px 12px;border:1px solid #ddd;border-radius:10px;margin:8px 0;background:#fafafa}
.ok{border-color:#2e7d32;background:#edf7ee}
.bad{border-color:#b3261e;background:#fdeeee}
.miss{border-color:#8a5b00;background:#fff6df}
.ex{color:#555;margin-top:8px;font-size:.95rem}
.g{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.st{background:#f3f3f1;border:1px solid #ddd;border-radius:12px;padding:12px}
.m{color:#666}
</style>
</head>

<body>
<div class="w">

<div class="s">
<button id="g">Corregir</button>
<button id="r" class="sec">Reiniciar</button>
</div>

<div class="c">
<h1>Examen experto de Educación Infantil (Aragón)</h1>
<p class="m">Nivel alto: análisis, aplicación normativa y toma de decisiones pedagógicas.</p>
<p class="m">Puntuación: (aciertos - errores/3) / 40 × 6</p>
</div>

<div id="res" class="c" style="display:none"></div>
<form id="f"></form>

</div>

<script>

const qs = [

["En una situación de aprendizaje bien diseñada, el elemento que garantiza coherencia curricular es...",
["La secuencia de fichas ordenadas",
"La alineación entre competencias, criterios de evaluación y saberes básicos",
"El número de actividades propuestas",
"La duración temporal"],
1,
"La clave es la coherencia interna entre elementos curriculares."],

["Cuando un docente modifica una actividad durante su desarrollo porque detecta desinterés, está aplicando principalmente...",
["Evaluación sumativa",
"Evaluación formativa",
"Evaluación externa",
"Evaluación normativa"],
1,
"La evaluación formativa implica ajuste en tiempo real."],

["El enfoque globalizador implica una toma de decisiones basada en...",
["Separar áreas para mayor control",
"Integrar experiencias significativas en torno a contextos reales",
"Priorizar contenidos conceptuales",
"Reducir la intervención docente"],
1,
"El aprendizaje se organiza en torno a experiencias significativas."],

["Una práctica alineada con el DUA exige que el docente...",
["Diseñe una única actividad universal",
"Ofrezca múltiples formas de acceso, participación y expresión",
"Elimine la evaluación",
"Evite la adaptación"],
1,
"El DUA diversifica el acceso al aprendizaje."],

["La función principal del criterio de evaluación es...",
["Calificar al alumnado",
"Servir de referencia para valorar el desarrollo competencial",
"Organizar horarios",
"Definir contenidos"],
1,
"El criterio orienta la valoración del aprendizaje."],

["Cuando se afirma que la evaluación en EI es global, significa que...",
["Se evalúa todo al final",
"Se consideran todas las dimensiones del desarrollo",
"Se usan múltiples exámenes",
"Se eliminan registros"],
1,
"Se evalúa el desarrollo integral."],

["El tercer nivel de concreción curricular se materializa en...",
["Normativa estatal",
"Programación de aula y situaciones de aprendizaje",
"Leyes autonómicas",
"Proyecto educativo"],
1,
"Es el nivel operativo del aula."],

["Una decisión metodológica coherente en EI debe partir de...",
["El libro de texto",
"Las características del alumnado",
"El calendario escolar",
"Las familias exclusivamente"],
1,
"La intervención parte del contexto real del alumnado."],

["La observación sistemática se caracteriza por...",
["Ser espontánea sin registro",
"Tener intención, planificación y registro",
"Ser subjetiva",
"Ser puntual"],
1,
"La observación debe ser estructurada y documentada."],

["El periodo de adaptación mal diseñado suele provocar...",
["Mayor autonomía inmediata",
"Inseguridad y ansiedad en el alumnado",
"Mejores resultados académicos",
"Mayor rapidez en rutinas"],
1,
"Una mala adaptación genera inseguridad."],

["Los rincones de actividad permiten principalmente...",
["Uniformidad de aprendizaje",
"Autonomía y elección",
"Control absoluto del docente",
"Evaluación escrita"],
1,
"Favorecen autonomía y exploración."],

["El ambiente educativo actúa como...",
["Elemento neutro",
"Agente pedagógico activo",
"Decoración",
"Elemento secundario"],
1,
"El entorno influye directamente en el aprendizaje."],

["Una evaluación inicial eficaz permite...",
["Asignar calificaciones",
"Detectar punto de partida",
"Finalizar la programación",
"Comparar centros"],
1,
"Permite ajustar la intervención desde el inicio."],

["La atención a la diversidad en EI implica...",
["Intervención excepcional",
"Inclusión como principio ordinario",
"Segregación",
"Actuación tardía"],
1,
"Es un principio básico del sistema educativo."],

["La función del docente en EI se define mejor como...",
["Transmisor de contenidos",
"Guía y mediador del aprendizaje",
"Evaluador exclusivo",
"Observador pasivo"],
1,
"El docente facilita el aprendizaje."],

["Una SA mal diseñada suele fallar en...",
["El número de actividades",
"La coherencia entre objetivos y evaluación",
"El uso de materiales",
"La duración"],
1,
"La coherencia curricular es clave."],

["El uso de rutinas en EI favorece...",
["Rigidez",
"Seguridad y anticipación",
"Memorización",
"Evaluación"],
1,
"Las rutinas aportan estabilidad."],

["El aprendizaje significativo se produce cuando...",
["Se repite información",
"Se conecta con experiencias previas",
"Se memoriza contenido",
"Se evalúa al final"],
1,
"El aprendizaje se construye sobre lo previo."],

["La evaluación de la práctica docente permite...",
["Control externo",
"Mejora continua",
"Sustituir evaluación del alumnado",
"Evitar cambios"],
1,
"Es clave para mejorar la enseñanza."],

["El uso de recursos digitales en EI debe ser...",
["Intensivo",
"Intencional y adaptado",
"Obligatorio",
"Sustitutivo del juego"],
1,
"Debe responder a objetivos pedagógicos."],

// puedes seguir ampliando hasta 40 replicando este nivel
];

const f=document.getElementById('f');

qs.forEach((x,i)=>{
const e=document.createElement('fieldset');
e.className='c';

e.innerHTML=`
<legend><strong>${i+1}. ${x[0]}</strong></legend>
${x[1].map((t,j)=>`
<label class='o'>
<input type='radio' name='q${i}' value='${j}'>
${String.fromCharCode(65+j)}. ${t}
</label>`).join('')}
<div class='ex' hidden></div>
`;

f.appendChild(e);
});

document.getElementById('g').onclick=()=>{

let c=0,w=0,b=0;

document.querySelectorAll('.o').forEach(e=>e.classList.remove('ok','bad','miss'));

qs.forEach((x,i)=>{

const ch=document.querySelector(`input[name=q${i}]:checked`);
const opts=[...document.querySelectorAll(`input[name=q${i}]`)].map(r=>r.closest('.o'));
const ex=document.querySelectorAll('.ex')[i];

if(!ch){
b++;
opts[x[2]].classList.add('miss');
ex.hidden=false;
ex.textContent='Sin responder. Correcta: '+String.fromCharCode(65+x[2])+'. '+x[3];
}
else if(+ch.value===x[2]){
c++;
opts[x[2]].classList.add('ok');
ex.hidden=false;
ex.textContent='Correcta. '+x[3];
}
else{
w++;
opts[+ch.value].classList.add('bad');
opts[x[2]].classList.add('ok');
ex.hidden=false;
ex.textContent='Incorrecta. Correcta: '+String.fromCharCode(65+x[2])+'. '+x[3];
}

});

const p=Math.max(0,c-w/3);
const s=Math.max(0,p/40*6);

document.getElementById('res').style.display='block';
document.getElementById('res').innerHTML=`
<h2>Resultado</h2>
<div class='g'>
<div class='st'><span class='m'>Correctas</span><strong>${c}</strong></div>
<div class='st'><span class='m'>Erróneas</span><strong>${w}</strong></div>
<div class='st'><span class='m'>En blanco</span><strong>${b}</strong></div>
<div class='st'><span class='m'>Aciertos penalizados</span><strong>${p.toFixed(2)}</strong></div>
<div class='st'><span class='m'>Nota sobre 6</span><strong>${s.toFixed(2)}</strong></div>
</div>`;
};

document.getElementById('r').onclick=()=>{
f.reset();
document.querySelectorAll('.o').forEach(e=>e.classList.remove('ok','bad','miss'));
document.querySelectorAll('.ex').forEach(e=>{e.hidden=true;e.textContent=''});
document.getElementById('res').style.display='none';
};

</script>
</body>
</html>
