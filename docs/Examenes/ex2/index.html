<!doctype html>
<html lang="es" data-theme="light">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Examen ECD/853/2022 y RD 95/2022</title>
<style>
body{font-family:system-ui;background:#f7f7f5;color:#222;margin:0}.wrap{max-width:980px;margin:auto;padding:20px}.card{background:#fff;border:1px solid #ddd;border-radius:14px;padding:18px;margin:14px 0;box-shadow:0 6px 18px rgba(0,0,0,.06)}button{background:#0b6b73;color:#fff;border:0;border-radius:10px;padding:12px 16px;font-weight:700;cursor:pointer}button.secondary{background:#eee;color:#222}.q{padding:14px;border-top:1px solid #eee}.q:first-child{border-top:0}.opt{display:block;padding:10px 12px;border:1px solid #ddd;border-radius:10px;margin:8px 0;background:#fafafa}.ok{border-color:#2e7d32;background:#edf7ee}.bad{border-color:#b3261e;background:#fdeeee}.miss{border-color:#8a5b00;background:#fff6df}.res{display:none}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}.stat{background:#f3f3f1;border:1px solid #ddd;border-radius:12px;padding:12px}.muted{color:#666}.sticky{position:sticky;top:0;background:linear-gradient(#f7f7f5 75%, rgba(247,247,245,0));padding:10px 0;z-index:3}.exp{color:#666;margin-top:8px;font-size:.95rem}</style>
</head><body><div class="wrap"><div class="sticky"><button id="grade">Corregir</button> <button id="reset" class="secondary">Reiniciar</button></div><div class="card"><h1>Examen de 40 preguntas</h1><p class="muted">Formato interactivo con autocorrección y puntuación sobre 6: (aciertos - erróneas/3) / 40 × 6.</p></div><div id="result" class="card res"></div><form id="form"></form></div>
<script>
const qs=[
['La Orden ECD/853/2022 tiene por objeto', ['Solo regular el comedor escolar','Establecer la ordenación, aprobar el currículo y regular la evaluación de EI en Aragón','Desarrollar solo el segundo ciclo','Regular exclusivamente el transporte escolar'],1,'La Orden regula ordenación, currículo y evaluación en la etapa.'],
['El Real Decreto 95/2022 define la EI como una etapa', ['Optativa y externa','Única, con identidad propia y dos ciclos','Sin identidad propia','Solo preparatoria de Primaria'],1,'El RD 95/2022 la define como etapa única con dos ciclos.'],
['En Aragón, la evaluación de EI debe ser', ['Final y selectiva','Global, continua y formativa','Solo numérica','Exclusivamente externa'],1,'La Orden autonómica y el RD coinciden en esa caracterización.'],
['La técnica principal de evaluación en EI es', ['Pruebas escritas','Observación directa y sistemática','Exámenes orales','Test psicométricos'],1,'La observación directa y sistemática es la técnica principal.'],
['Las situaciones de aprendizaje implican', ['Actividades aisladas sin competencia','Actuaciones del alumnado que desarrollan competencias y saberes básicos','Solo juegos libres','Sólo ficha escrita'],1,'La definición normativa vincula actuaciones, competencias y saberes básicos.'],
['El DUA se usa como', ['Un sistema de calificación','Una guía para diseñar situaciones inclusivas','Una ley de ratios','Un criterio de espacios'],1,'El DUA guía el diseño inclusivo.'],
['En el currículo aragonés, la primera aproximación a la lengua extranjera se fomenta', ['En el primer ciclo','Solo en infantil privado','En el segundo ciclo','Nunca'],2,'Se contempla en el segundo ciclo.'],
['Una situación de aprendizaje permanente es', ['Proyecto del huerto','Rutina de higiene','Salida extraescolar','Día del libro'],1,'Las rutinas estables se consideran permanentes.'],
['La Programación General Anual recoge', ['Solo criterios de evaluación','Aspectos de organización y funcionamiento del curso','Únicamente la arquitectura del centro','La normativa estatal completa'],1,'La PGA concreta organización y funcionamiento del curso.'],
['El PEC define', ['La ratio legal','La identidad, valores y metas del centro','Las actividades diarias del aula','Las fichas de evaluación'],1,'El PEC recoge identidad, valores y metas.'],
['Los talleres favorecen', ['Memorización pasiva','Creatividad, manipulación y experimentación','Solo trabajo en silencio','Exámenes orales'],1,'Los talleres se orientan a creatividad y experimentación.'],
['Los rincones se caracterizan por', ['Ser siempre individuales','Fomentar autonomía y exploración','Eliminar el juego simbólico','No cambiar durante el curso'],1,'Los rincones favorecen autonomía y exploración.'],
['El período de adaptación busca', ['Separar a la familia desde el primer día','Incorporación progresiva y creación de vínculos','Aumentar la carga lectiva','Suspender rutinas'],1,'Se organiza para favorecer adaptación progresiva.'],
['La evaluación diagnóstica sirve para', ['Poner nota final','Detectar necesidades y conocimientos previos','Sustituir la observación','Comparar centros'],1,'Su función es diagnóstica: necesidades y punto de partida.'],
['Un sociograma es', ['Una lista de asistencia','Una representación de relaciones afectivas','Un informe médico','Una escala de notas'],1,'Representa relaciones de aceptación y rechazo.'],
['La ratio máxima 0-1 año en Aragón es', ['6','8','10','12'],1,'La Orden fija 8.'],
['La ratio máxima 1-2 años en Aragón es', ['10','12','13','15'],2,'La Orden fija 13.'],
['La ratio máxima 2-3 años en Aragón es', ['16','18','20','22'],2,'La Orden fija 20.'],
['Para menores de 2 años deben existir', ['Solo patio','Áreas diferenciadas de descanso e higiene','Aula única sin zonas','Gimnasio'],1,'La normativa exige esas áreas diferenciadas.'],
['En un centro infantil debe haber', ['Laboratorio de química','Sala de usos múltiples','Piscina obligatoria','Biblioteca universitaria'],1,'La sala de usos múltiples aparece en los materiales y la normativa.'],
['La atención a la diversidad en EI debe ser', ['Excepcional','La pauta ordinaria e inclusiva','Solo médica','Una medida punitiva'],1,'La pauta ordinaria es la atención individualizada e inclusiva.'],
['El Plan de Atención a la Diversidad se incorpora al', ['Proyecto Curricular de etapa o ciclo','RRI exclusivamente','Calendario laboral','Plan de comedor'],0,'Los apuntes indican su incorporación al PCC o ciclo.'],
['La observación indirecta puede apoyarse en', ['Informes, grabaciones o fotografías','Solo memorias de alumnado','Únicamente entrevistas de vecinos','Exámenes escritos'],0,'La observación indirecta se apoya en evidencias documentales.'],
['Las listas de cotejo usan', ['Respuestas abiertas largas','Indicadores con respuestas dicotómicas','Escalas solo numéricas','Ensayos'],1,'Las listas de cotejo emplean indicadores y respuestas dicotómicas.'],
['Las escalas de estimación permiten', ['Valorar grado o frecuencia de una conducta','Sustituir toda observación','Hacer ratios','Fijar el currículo'],0,'Sirven para graduar grado o frecuencia.'],
['Los materiales en EI deben ser', ['Sólo caros','Seguros, resistentes y adecuados','Siempre tecnológicos','No manipulables'],1,'En los materiales se priorizan seguridad, resistencia y adecuación.'],
['En 0-3, la alimentación y el sueño son', ['Momentos sin valor educativo','Actos con intencionalidad educativa','Solo cuidados sanitarios','Tareas externas al aula'],1,'En 0-3 todo tiempo tiene intencionalidad educativa.'],
['La estrategia expositiva consiste en', ['Exploración autónoma completa','Presentación directa de información','Sólo evaluación','Trabajo administrativo'],1,'Es la presentación directa de la información.'],
['Las estrategias mixtas combinan', ['Solo juego libre','Exposición y descubrimiento','Únicamente exámenes','Solo rincones'],1,'Combinan exposición y descubrimiento.'],
['La situación de aprendizaje debe incluir', ['Título, contextualización, objetivos, actividades y evaluación','Solo título y fecha','Solo recursos','Sólo calificación'],0,'La estructura completa incluye esos elementos.'],
['La evaluación también debe valorar', ['Solo al alumnado','La práctica educativa y recursos','Solo familias','Solo espacios'],1,'La evaluación incluye también la práctica educativa y los recursos.'],
['La jornada en EI debe adaptarse', ['A ritmos biológicos y necesidades infantiles','A la preferencia del libro de texto','A la universidad','A horarios fijos de secundaria'],0,'Debe adaptarse a ritmos y necesidades.'],
['Los recursos digitales en EI deben ser', ['Impuestos por defecto','Adaptados a las características infantiles','Exclusivos','Prohibidos siempre'],1,'Los principios metodológicos piden recursos digitales adaptados.'],
['El curriculum de Aragón incorpora', ['Solo contenidos técnicos','Patrimonio, territorio y entorno natural y sociocultural','Únicamente inglés','Solo matemáticas'],1,'La Orden contextualiza el currículo a Aragón con patrimonio y entorno.'],
['En planificación no formal, el proyecto es', ['El nivel más concreto','El nivel más amplio','Un documento administrativo','Un instrumento de evaluación'],0,'El proyecto es el nivel más concreto en plan-programa-proyecto.'],
['Una ficha de actividad suele incluir', ['Título, temporalización, recursos y evaluación','Sólo área y nota','Sólo contenidos','Sólo nombre del centro'],0,'La ficha incluye título, temporalización, recursos y evaluación.'],
['En evaluación, el momento final permite', ['Conocer resultados de aprendizaje','Sustituir el proceso','Eliminar observación','Definir ratios'],0,'El momento final valora resultados de aprendizaje.'],
['La programación didáctica concreta', ['Solo el horario','Competencias, saberes, metodología, recursos y evaluación','Solo la decoración del aula','La plantilla del comedor'],1,'La programación didáctica concreta el proceso de aula.']
];
const form=document.getElementById('form');
qs.forEach((x,i)=>{const f=document.createElement('fieldset');f.className='card q';f.innerHTML=`<legend><strong>${i+1}. ${x[0]}</strong></legend>${x[1].map((t,j)=>`<label class='opt'><input type='radio' name='q${i}' value='${j}'> ${String.fromCharCode(65+j)}. ${t}</label>`).join('')}<div class='exp' hidden></div>`;form.appendChild(f);});
document.getElementById('grade').onclick=()=>{let c=0,w=0,b=0;document.querySelectorAll('.opt').forEach(e=>e.classList.remove('ok','bad','miss'));qs.forEach((x,i)=>{const chosen=document.querySelector(`input[name=q${i}]:checked`);const opts=[...document.querySelectorAll(`input[name=q${i}]`)].map(r=>r.closest('.opt'));const exp=document.querySelectorAll('.exp')[i];if(!chosen){b++;opts[x[1]?x[2]:x[2]].classList.add('miss');}if(!chosen){opts[x[2]].classList.add('miss');exp.hidden=false;exp.textContent='Sin responder. Correcta: '+String.fromCharCode(65+x[2])+'. '+x[3];}else if(+chosen.value===x[2]){c++;opts[x[2]].classList.add('ok');exp.hidden=false;exp.textContent='Correcta. '+x[3];}else{w++;opts[+chosen.value].classList.add('bad');opts[x[2]].classList.add('ok');exp.hidden=false;exp.textContent='Incorrecta. Correcta: '+String.fromCharCode(65+x[2])+'. '+x[3];}});const p=Math.max(0,c-w/3);const s=Math.max(0,p/40*6);document.getElementById('result').style.display='block';document.getElementById('result').innerHTML=`<h2>Resultado</h2><div class='grid'><div class='stat'><span class='muted'>Correctas</span><strong>${c}</strong></div><div class='stat'><span class='muted'>Erróneas</span><strong>${w}</strong></div><div class='stat'><span class='muted'>En blanco</span><strong>${b}</strong></div><div class='stat'><span class='muted'>Aciertos penalizados</span><strong>${p.toFixed(2)}</strong></div><div class='stat'><span class='muted'>Nota sobre 6</span><strong>${s.toFixed(2)}</strong></div></div>`;document.getElementById('result').scrollIntoView({behavior:'smooth'});};
document.getElementById('reset').onclick=()=>{form.reset();document.querySelectorAll('.opt').forEach(e=>e.classList.remove('ok','bad','miss'));document.querySelectorAll('.exp').forEach(e=>{e.hidden=true;e.textContent=''});document.getElementById('result').style.display='none';};
</script></body></html>
