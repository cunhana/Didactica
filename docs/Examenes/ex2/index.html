<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Nuevo examen EI Aragón</title><style>body{font-family:system-ui;background:#f6f5f1;color:#222;margin:0}.w{max-width:980px;margin:auto;padding:20px}.c{background:#fff;border:1px solid #ddd;border-radius:14px;padding:18px;margin:14px 0;box-shadow:0 8px 20px rgba(0,0,0,.06)}.s{position:sticky;top:0;background:linear-gradient(#f6f5f1 80%,rgba(246,245,241,0));padding:10px 0;z-index:5}button{background:#0b6b73;color:#fff;border:0;border-radius:10px;padding:12px 16px;font-weight:700;cursor:pointer}button.sec{background:#eee;color:#222}.o{display:block;padding:10px 12px;border:1px solid #ddd;border-radius:10px;margin:8px 0;background:#fafafa}.ok{border-color:#2e7d32;background:#edf7ee}.bad{border-color:#b3261e;background:#fdeeee}.miss{border-color:#8a5b00;background:#fff6df}.g{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}.st{background:#f3f3f1;border:1px solid #ddd;border-radius:12px;padding:12px}.m{color:#666}.ex{color:#666;margin-top:8px;font-size:.95rem}</style></head><body><div class="w"><div class="s"><button id="g">Corregir</button> <button id="r" class="sec">Reiniciar</button></div><div class="c"><h1>Examen de 40 preguntas</h1><p class="m">Autocorrección con la fórmula exacta: (aciertos - erróneas/3) / 40 × 6.</p><p class="m">Basado en Orden ECD/853/2022 y RD 95/2022, contrastado con tus apuntes.</p></div><div id="res" class="c" style="display:none"></div><form id="f"></form></div><script>const qs=[["La Orden ECD/853/2022 tiene como objeto principal...", ["Regular solo la jornada escolar", "Establecer la ordenación, aprobar el currículo y regular la evaluación de EI en Aragón", "Aprobar únicamente materiales didácticos", "Regular solo el primer ciclo"], 1, "La Orden regula ordenación, currículo y evaluación de la etapa."], ["El RD 95/2022 considera la evaluación en EI como...", ["Sumativa y selectiva", "Global, continua y formativa", "Solo cualitativa final", "Exclusivamente externa"], 1, "El RD 95/2022 la define como global, continua y formativa."], ["La técnica principal de evaluación en Educación Infantil es...", ["La prueba escrita", "La observación directa y sistemática", "La entrevista estructurada final", "El examen oral"], 1, "La observación directa y sistemática es la técnica principal."], ["Los criterios de evaluación en EI funcionan como...", ["Decoración curricular", "Referente para valorar objetivos y desarrollo competencial", "Sanción disciplinaria", "Lista de asistencia"], 1, "Son el referente fundamental de valoración."], ["Una situación de aprendizaje debe movilizar...", ["Solo contenidos teóricos", "Competencias clave, competencias específicas y saberes básicos", "Únicamente actividades artísticas", "Solo convivencia"], 1, "La definición normativa vincula competencias y saberes."], ["El DUA se utiliza para...", ["Homogeneizar el aula", "Diseñar situaciones de aprendizaje inclusivas", "Sustituir la evaluación", "Aumentar ratios"], 1, "El DUA guía el diseño inclusivo."], ["En la EI, el juego se considera...", ["Un descanso entre tareas serias", "Principal recurso metodológico", "Una actividad optativa sin valor", "Solo recreo"], 1, "El juego es el principal recurso metodológico."], ["El enfoque metodológico en EI debe ser...", ["Fragmentado y memorístico", "Globalizador e integrador", "Exclusivamente académico", "Centrado en pruebas"], 1, "Los principios metodológicos apuestan por enfoque globalizador e integrador."], ["El período de adaptación debe planificarse para...", ["Suprimir rutinas", "Favorecer incorporación progresiva y vínculos", "Aumentar el número de fichas", "Evitar la participación familiar"], 1, "Se orienta a una incorporación progresiva."], ["La programacion didáctica de aula se sitúa en el...", ["Primer nivel de concreción", "Segundo nivel de concreción", "Tercer nivel de concreción", "Nivel administrativo externo"], 2, "El tercer nivel corresponde al trabajo docente."], ["El PEC define principalmente...", ["La identidad, valores y metas del centro", "Las calificaciones del alumnado", "Las ratios legales", "Los criterios de evaluación de una sola SA"], 0, "El PEC recoge identidad, valores y metas."], ["La PGA recoge...", ["Solo el inventario", "La organización y funcionamiento del curso", "Solo el currículo autonómico", "Solo las pruebas de evaluación"], 1, "La PGA organiza el curso escolar."], ["En la planificación no formal, el nivel más amplio es...", ["Proyecto", "Programa", "Plan", "Actividad"], 2, "El plan es el nivel más amplio."], ["Las actividades de un proyecto deben ser...", ["Aleatorias", "Concretas, secuenciadas y vinculadas a objetivos operativos", "Solo repetitivas", "Sin temporalización"], 1, "El proyecto concreta objetivos y actuaciones."], ["Las aulas de EI deben presentar...", ["Ambientes rígidos y cerrados", "Zonas diferenciadas y organización funcional", "Solo mesas en filas", "Ausencia de materiales"], 1, "Los espacios se organizan por zonas y funciones."], ["Según la Orden de Aragón, la ratio máxima 0-1 años es...", ["6", "8", "10", "12"], 1, "La ratio es 8."], ["La ratio máxima 1-2 años es...", ["12", "13", "14", "15"], 1, "La ratio es 13."], ["La ratio máxima 2-3 años es...", ["18", "19", "20", "22"], 2, "La ratio es 20."], ["Para menores de 2 años, la normativa recoge...", ["Áreas diferenciadas de descanso e higiene", "Aula única sin descansos", "Solo patio cubierto", "Un despacho privado"], 0, "Deben existir áreas diferenciadas."], ["La sala de usos múltiples se asocia con...", ["Espacio para psicomotricidad y actividades comunes", "Despacho administrativo obligatorio", "Aula de exámenes", "Zona de castigo"], 0, "Se usa para psicomotricidad y usos comunes."], ["Los talleres favorecen...", ["Creatividad, manipulación y experimentación", "Sólo copia escrita", "Memorización mecánica", "Pasividad"], 0, "Los talleres impulsan creatividad y experimentación."], ["Los rincones favorecen...", ["Autonomía, exploración y aprendizaje activo", "Exclusivamente trabajo individual", "Menor interacción social", "Solo evaluación"], 0, "Los rincones promueven autonomía y exploración."], ["En EI, el docente debe mostrar...", ["Actitud distante", "Afectividad, equilibrio y disponibilidad", "Neutralidad rígida", "Autoritarismo"], 1, "El papel docente se describe afectivo y equilibrado."], ["La observación indirecta puede apoyarse en...", ["Informes, grabaciones o fotografías", "Solo exámenes", "Únicamente cuadernos de deberes", "Tablas estadísticas externas"], 0, "La observación indirecta usa documentación y registros."], ["Las listas de cotejo se caracterizan por...", ["Respuestas abiertas", "Indicadores con respuestas dicotómicas", "Escalas narrativas extensas", "Solo puntuaciones de 10"], 1, "Las listas de cotejo usan indicadores y registro simple."], ["Las escalas de estimación permiten...", ["Valorar el grado o frecuencia de una conducta", "Sustituir al criterio de evaluación", "Aprobar el currículo", "Definir ratios"], 0, "Sirven para graduar conducta o frecuencia."], ["La agenda escolar sirve sobre todo para...", ["Comunicación con familias", "Control de acceso al centro", "Sanción disciplinaria", "Sustituir la programación"], 0, "Es un instrumento de comunicación con las familias."], ["Las situaciones permanentes incluyen...", ["Rutinas de higiene, alimentación o sueño", "Solo salidas", "Festivales ocasionales", "Excursiones de fin de curso"], 0, "Las rutinas estables son permanentes."], ["Las situaciones temporales incluyen...", ["Adaptación, talleres o proyectos", "Lavado de manos diario", "Entrada y salida", "Descanso"], 0, "Son módulos acotados en el tiempo."], ["El proceso evaluador debe contribuir a...", ["Mejorar enseñanza y aprendizaje", "Cerrar la información", "Eliminar la observación", "Aumentar la burocracia"], 0, "La evaluación sirve para mejorar enseñanza y aprendizaje."], ["Las familias deben...", ["Ser ajenas al proceso", "Participar y colaborar en la evolución educativa", "Solo recibir notas al final", "Sustituir al profesorado"], 1, "La norma prevé su participación y colaboración."], ["En Aragón, el currículo contextualiza la realidad de...", ["La Unión Europea solamente", "El territorio, el patrimonio y el entorno sociocultural", "Solo Madrid", "Solo el clima escolar"], 1, "La Orden contextualiza territorio, patrimonio y entorno."], ["La programación de aula debe incluir...", ["Objetivos, actividades, recursos y evaluación", "Solo título y portada", "Solo fichas de asistencia", "Solo ratios"], 0, "La programación concreta objetivos, recursos, actividades y evaluación."], ["El espacio exterior de EI debe favorecer...", ["Solo carrera rápida", "Juego motor, sensorial y exploración", "Únicamente descanso", "Ninguna actividad"], 1, "El exterior promueve motricidad, juego y exploración."], ["El mobiliario infantil debe ser...", ["Pesado y fijo", "Polivalente, seguro y a escala infantil", "Decorativo únicamente", "Exclusivamente tecnológico"], 1, "La adecuación, seguridad y escala infantil son claves."], ["La intervención socioeducativa en ámbito no formal comienza por...", ["Análisis de la realidad", "Calificación final", "Elaboración del examen", "Contratación del equipo"], 0, "La primera fase es el análisis de la realidad."], ["El nivel más concreto de planificación no formal es...", ["Plan", "Programa", "Proyecto", "Marco legal"], 2, "El proyecto es el nivel más concreto."], ["La evaluación de la propia práctica docente es...", ["Opcional y ajena al proceso", "Parte del proceso evaluador", "Solo de inspección", "Un trámite externo sin valor"], 1, "La normativa indica que se evalúe la propia práctica."], ["Las competencias específicas se relacionan con...", ["Logros vinculados a áreas concretas", "Los calendarios festivos", "Las ratios de aula", "La decoración del centro"], 0, "Se asocian a áreas y logros concretos."], ["La primera aproximación a la lectoescritura en EI es...", ["Obligatoria y formal desde los 3 años", "No exigible, pero puede favorecerse", "Prohibida", "Exclusiva de Primaria"], 1, "En EI no es exigible, aunque puede favorecerse."]];const f=document.getElementById('f');qs.forEach((x,i)=>{const e=document.createElement('fieldset');e.className='c';e.innerHTML=`<legend><strong>${i+1}. ${x[0]}</strong></legend>${x[1].map((t,j)=>`<label class='o'><input type='radio' name='q${i}' value='${j}'> ${String.fromCharCode(65+j)}. ${t}</label>`).join('')}<div class='ex' hidden></div>`;f.appendChild(e)});document.getElementById('g').onclick=()=>{let c=0,w=0,b=0;document.querySelectorAll('.o').forEach(e=>e.classList.remove('ok','bad','miss'));qs.forEach((x,i)=>{const ch=document.querySelector(`input[name=q${i}]:checked`);const opts=[...document.querySelectorAll(`input[name=q${i}]`)].map(r=>r.closest('.o'));const ex=document.querySelectorAll('.ex')[i];if(!ch){b++;opts[x[2]].classList.add('miss');ex.hidden=false;ex.textContent='Sin responder. Correcta: '+String.fromCharCode(65+x[2])+'. '+x[3]}else if(+ch.value===x[2]){c++;opts[x[2]].classList.add('ok');ex.hidden=false;ex.textContent='Correcta. '+x[3]}else{w++;opts[+ch.value].classList.add('bad');opts[x[2]].classList.add('ok');ex.hidden=false;ex.textContent='Incorrecta. Correcta: '+String.fromCharCode(65+x[2])+'. '+x[3]}});const p=Math.max(0,c-w/3);const s=Math.max(0,p/40*6);document.getElementById('res').style.display='block';document.getElementById('res').innerHTML=`<h2>Resultado</h2><div class='g'><div class='st'><span class='m'>Correctas</span><strong>${c}</strong></div><div class='st'><span class='m'>Erróneas</span><strong>${w}</strong></div><div class='st'><span class='m'>En blanco</span><strong>${b}</strong></div><div class='st'><span class='m'>Aciertos penalizados</span><strong>${p.toFixed(2)}</strong></div><div class='st'><span class='m'>Nota sobre 6</span><strong>${s.toFixed(2)}</strong></div></div>`;document.getElementById('res').scrollIntoView({behavior:'smooth'})};document.getElementById('r').onclick=()=>{f.reset();document.querySelectorAll('.o').forEach(e=>e.classList.remove('ok','bad','miss'));document.querySelectorAll('.ex').forEach(e=>{e.hidden=true;e.textContent=''});document.getElementById('res').style.display='none'};</script></body></html>
